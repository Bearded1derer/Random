<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galactic Cat: Zombie Curer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            touch-action: none; /* Prevents zooming on touch screens */
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }
        #worldDisplay {
            font-size: 20px;
            color: #ffcc00;
            margin-top: 5px;
        }
        #healthBar {
            font-size: 24px;
            color: #ff3366;
            margin-top: 5px;
        }
        #controlsHelp {
            position: absolute;
            top: 90px;
            left: 20px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 4px solid #ff3366;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff3366;
            z-index: 100;
        }
        h1 { margin: 0 0 20px 0; font-size: 48px; color: #ff3366; }
        button {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #00ffcc;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.1); background-color: #fff; }

        /* Mobile Touch Controls */
        #touchControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 10px;
            padding-left: 20px;
            pointer-events: auto;
        }
        .actions {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            padding-right: 20px;
            pointer-events: auto;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            touch-action: none; /* Crucial for touch interfaces */
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }
        .dpad-btn {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            font-size: 24px;
        }
        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 30px;
        }
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }

        @media (max-width: 600px) {
            #controlsHelp { display: none; } /* Hide text help on small screens */
            #scoreBoard { font-size: 18px; }
            #worldDisplay { font-size: 16px; }
            #healthBar { font-size: 18px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="scoreBoard">Zombies Cured: 0</div>
        <div id="worldDisplay">World: 1 - Earth's Atmosphere</div>
        <div id="healthBar">Health: ❤️❤️❤️</div>
    </div>

    <div id="controlsHelp">
        Keyboard: WASD/Arrows | SPACE: Knife | Z: Sword
    </div>

    <!-- Mobile Touch Controls overlay -->
    <div id="touchControls">
        <div class="dpad">
            <div id="btnUp" class="touch-btn dpad-btn">▲</div>
            <div id="btnLeft" class="touch-btn dpad-btn">◀</div>
            <div id="btnDown" class="touch-btn dpad-btn">▼</div>
            <div id="btnRight" class="touch-btn dpad-btn">▶</div>
        </div>
        <div class="actions">
            <div id="btnSword" class="touch-btn action-btn">⚔️</div>
            <div id="btnKnife" class="touch-btn action-btn">🗡️</div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="finalScore" style="font-size: 24px; margin-bottom: 20px;">You cured 0 zombies.</p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const scoreBoard = document.getElementById('scoreBoard');
        const worldDisplay = document.getElementById('worldDisplay');
        const healthBar = document.getElementById('healthBar');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');

        // Setup Canvas Size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        let gameActive = true;
        let score = 0;
        let level = 1;
        let frameCount = 0;

        // Worlds configuration
        const worlds = [
            { name: "Earth's Orbit", color: "#1a0b2e", stars: "#ffffff" },
            { name: "The Red Planet", color: "#3d1414", stars: "#ff9999" },
            { name: "Toxic Nebula", color: "#0f3319", stars: "#99ff99" },
            { name: "Golden Galaxy", color: "#332d0f", stars: "#ffff99" },
            { name: "Deep Void", color: "#000000", stars: "#ff00ff" }
        ];
        let currentWorld = worlds[0];

        // Input Tracking
        const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false, ' ':false, z:false };
        
        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key) || e.key === ' ') keys[e.key] = true;
            if(e.key === ' ' && gameActive) shootKnife();
            if(e.key.toLowerCase() === 'z' && gameActive) swingSword();
        });
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key) || e.key === ' ') keys[e.key] = false;
        });

        // Touch Controls Setup
        function bindTouch(btnId, keyStr, actionFunc) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            const press = (e) => {
                // Prevent default stops double-firing and browser gestures
                if (e.cancelable) e.preventDefault(); 
                keys[keyStr] = true;
                if(actionFunc && gameActive) actionFunc();
            };

            const release = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[keyStr] = false;
            };

            // Explicitly use touchstart/touchend for rock-solid mobile support
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('mousedown', press);

            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('touchcancel', release, {passive: false});
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        bindTouch('btnUp', 'w');
        bindTouch('btnDown', 's');
        bindTouch('btnLeft', 'a');
        bindTouch('btnRight', 'd');
        bindTouch('btnKnife', ' ', shootKnife);
        bindTouch('btnSword', 'z', swingSword);

        // --- Game Objects ---

        const cat = {
            x: 100,
            y: canvas.height / 2,
            size: 40,
            speed: 7,
            health: 3,
            swordTimer: 0,
            swordCooldown: 0
        };

        let knives = [];
        let zombies = [];
        let particles = [];
        let stars = [];

        // Initialize Stars
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 3 + 1
            });
        }

        // Actions
        function shootKnife() {
            // Prevent spamming too fast
            if (knives.length < 5) {
                knives.push({
                    x: cat.x + cat.size,
                    y: cat.y,
                    speed: 15,
                    size: 20
                });
                createParticles(cat.x + cat.size, cat.y, 5, '#ff6600');
            }
        }

        function swingSword() {
            if (cat.swordCooldown <= 0) {
                cat.swordTimer = 15; // Sword stays out for 15 frames
                cat.swordCooldown = 30; // Cannot swing again for 30 frames
            }
        }

        function spawnZombie() {
            // Gets harder as level increases
            let spawnRate = Math.max(20, 80 - (level * 5)); 
            if (frameCount % spawnRate === 0) {
                zombies.push({
                    x: canvas.width + 50,
                    y: Math.random() * (canvas.height - 100) + 50,
                    speed: Math.random() * 2 + 2 + (level * 0.5),
                    size: 40,
                    wobble: Math.random() * Math.PI * 2
                });
            }
        }

        function createParticles(x, y, count, color, speedMultiplier = 1) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10 * speedMultiplier,
                    vy: (Math.random() - 0.5) * 10 * speedMultiplier,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateLevel() {
            let newLevel = Math.floor(score / 10) + 1;
            if (newLevel > level) {
                level = newLevel;
                // Change world based on level (loops through array)
                currentWorld = worlds[(level - 1) % worlds.length];
                worldDisplay.innerText = `World: ${level} - ${currentWorld.name}`;
                // Celebration explosion
                createParticles(canvas.width/2, canvas.height/2, 100, '#00ffcc', 3);
            }
        }

        function updateHealthUI() {
            let hearts = "";
            for(let i=0; i<cat.health; i++) hearts += "❤️";
            healthBar.innerText = `Health: ${hearts}`;
            if (cat.health <= 0) {
                gameActive = false;
                gameOverScreen.style.display = 'block';
                finalScore.innerText = `You cured ${score} zombies and reached World ${level}!`;
            }
        }

        function resetGame() {
            cat.health = 3;
            score = 0;
            level = 1;
            cat.x = 100;
            cat.y = canvas.height / 2;
            knives = [];
            zombies = [];
            particles = [];
            currentWorld = worlds[0];
            gameActive = true;
            gameOverScreen.style.display = 'none';
            scoreBoard.innerText = `Zombies Cured: 0`;
            worldDisplay.innerText = `World: 1 - Earth's Atmosphere`;
            updateHealthUI();
            
            // Reset keyboard keys in case they stuck during game over
            for (let k in keys) keys[k] = false;
        }

        // --- Main Game Loop ---

        function update() {
            if (!gameActive) return;

            frameCount++;

            // Player Movement
            if (keys.w || keys.ArrowUp) cat.y -= cat.speed;
            if (keys.s || keys.ArrowDown) cat.y += cat.speed;
            if (keys.a || keys.ArrowLeft) cat.x -= cat.speed;
            if (keys.d || keys.ArrowRight) cat.x += cat.speed;

            // Keep cat on screen
            cat.x = Math.max(cat.size, Math.min(canvas.width - cat.size, cat.x));
            cat.y = Math.max(cat.size, Math.min(canvas.height - cat.size, cat.y));

            // Sword Logic
            if (cat.swordTimer > 0) cat.swordTimer--;
            if (cat.swordCooldown > 0) cat.swordCooldown--;

            // Update Stars
            stars.forEach(star => {
                star.x -= star.speed + (level * 0.5); // Stars move faster on higher levels
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
            });

            // Update Knives
            for (let i = knives.length - 1; i >= 0; i--) {
                let k = knives[i];
                k.x += k.speed;
                // Fire trail effect
                createParticles(k.x - 10, k.y, 1, '#ff3300');
                createParticles(k.x - 10, k.y, 1, '#ffcc00');
                
                if (k.x > canvas.width) {
                    knives.splice(i, 1);
                }
            }

            // Spawn & Update Zombies
            spawnZombie();
            
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                z.x -= z.speed;
                z.wobble += 0.1;
                z.y += Math.sin(z.wobble) * 2; // Zombie shambling effect

                // Collision: Zombie hits Cat
                let distToCat = Math.hypot(cat.x - z.x, cat.y - z.y);
                if (distToCat < cat.size/2 + z.size/2) {
                    cat.health--;
                    updateHealthUI();
                    createParticles(cat.x, cat.y, 30, '#ff3366');
                    zombies.splice(i, 1);
                    continue;
                }

                // Collision: Sword hits Zombie
                if (cat.swordTimer > 0) {
                    // Sword hit box is a large area in front of the cat
                    if (z.x > cat.x && z.x < cat.x + 150 && Math.abs(cat.y - z.y) < 100) {
                        cureZombie(i, z.x, z.y);
                        continue;
                    }
                }

                // Collision: Knife hits Zombie
                let knifeHit = false;
                for (let j = knives.length - 1; j >= 0; j--) {
                    let k = knives[j];
                    if (Math.hypot(k.x - z.x, k.y - z.y) < k.size/2 + z.size/2) {
                        knives.splice(j, 1); // Remove knife
                        cureZombie(i, z.x, z.y); // Cure zombie
                        knifeHit = true;
                        break;
                    }
                }

                if (knifeHit) continue;

                // Remove zombie if it goes off screen
                if (z.x < -50) {
                    zombies.splice(i, 1);
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function cureZombie(index, x, y) {
            zombies.splice(index, 1);
            score++;
            scoreBoard.innerText = `Zombies Cured: ${score}`;
            // "Cure" effect - bursts of green and gold!
            createParticles(x, y, 20, '#00ffcc');
            createParticles(x, y, 10, '#ffff00');
            updateLevel();
        }

        // --- Drawing Loop ---

        function draw() {
            // Clear and draw background
            ctx.fillStyle = currentWorld.color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Stars
            ctx.fillStyle = currentWorld.stars;
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Draw Giant Fire Sword
            if (cat.swordTimer > 0) {
                ctx.save();
                ctx.translate(cat.x, cat.y);
                
                // Animate the swing angle
                let swingProgress = 1 - (cat.swordTimer / 15); // 0 to 1
                let angle = -Math.PI/2 + (swingProgress * Math.PI); // Swing from top to bottom
                
                ctx.rotate(angle);
                
                // Draw fire blade
                let gradient = ctx.createLinearGradient(0, 0, 150, 0);
                gradient.addColorStop(0, "white");
                gradient.addColorStop(0.2, "yellow");
                gradient.addColorStop(0.6, "orange");
                gradient.addColorStop(1, "red");

                ctx.beginPath();
                ctx.moveTo(20, -10);
                ctx.lineTo(150, 0);
                ctx.lineTo(20, 10);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Fire sparks from sword
                createParticles(cat.x + Math.cos(angle)*150, cat.y + Math.sin(angle)*150, 2, 'orange');

                ctx.restore();
            }

            // Draw Knives
            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            knives.forEach(k => {
                ctx.fillText('🗡️', k.x, k.y);
            });

            // Draw Zombies
            ctx.font = "40px Arial";
            zombies.forEach(z => {
                ctx.fillText('🧟‍♂️', z.x, z.y);
            });

            // Draw Flying Cat (Hero)
            ctx.font = "45px Arial";
            
            // Add a little jetpack flame when moving
            if (keys.w || keys.a || keys.s || keys.d || keys.ArrowUp || keys.ArrowLeft || keys.ArrowDown || keys.ArrowRight) {
                createParticles(cat.x - 20, cat.y + 10, 1, '#00ccff'); 
            }
            
            ctx.fillText('🐱', cat.x, cat.y);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game!
        gameLoop();

    </script>
</body>
</html>
