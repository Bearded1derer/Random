<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Great Toast Rebellion</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none;
            user-select: none;
        }
        #game-ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            pointer-events: none; 
            z-index: 10;
        }
        .stat { font-size: 1.2rem; margin-bottom: 5px; font-weight: bold; }
        #timer { color: #58a6ff; }
        #health-bar-container { 
            width: 200px; height: 15px; background: #333; 
            border: 2px solid #555; border-radius: 10px; overflow: hidden;
        }
        #health-bar-fill { width: 100%; height: 100%; background: #238636; transition: width 0.2s; }

        canvas { display: block; background: linear-gradient(to bottom, #1e2a44, #3a4b76); }
        
        #joystick-container {
            position: absolute; 
            bottom: 40px; 
            left: 40px;
            width: 100px; 
            height: 100px; 
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; 
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #joystick-knob {
            width: 40px; 
            height: 40px; 
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 2.5rem; text-align: center; display: none; z-index: 20;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 900;
            width: 80%;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #238636;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stat">TIME UNTIL BOSS: <span id="timer">60</span>s</div>
        <div class="stat">TOAST INTEGRITY</div>
        <div id="health-bar-container">
            <div id="health-bar-fill"></div>
        </div>
    </div>

    <div id="message">
        <div id="msg-text"></div>
        <button id="restart-btn" onclick="location.reload()">RETRY</button>
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const healthFill = document.getElementById('health-bar-fill');
const messageEl = document.getElementById('message');
const msgText = document.getElementById('msg-text');
const joyContainer = document.getElementById('joystick-container');
const joyKnob = document.getElementById('joystick-knob');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Game State
let gameActive = true;
let timeLeft = 60;
let bossMode = false;

// Player (Toast)
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 45,
    hp: 100,
    speed: 5,
    vx: 0,
    vy: 0,
    angle: 0
};

// Dragon Sidekick
const dragon = { x: 0, y: 0, angle: 0 };

// Objects
let enemies = [];
let flames = [];
let dragonFire = [];
let boss = null;

// Controls Logic (Unified Pointer)
let joystick = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
let keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

joyContainer.addEventListener('pointerdown', e => {
    joystick.active = true;
    const rect = joyContainer.getBoundingClientRect();
    joystick.startX = rect.left + rect.width / 2;
    joystick.startY = rect.top + rect.height / 2;
    joyContainer.setPointerCapture(e.pointerId);
});

window.addEventListener('pointermove', e => {
    if (!joystick.active) return;
    let dx = e.clientX - joystick.startX;
    let dy = e.clientY - joystick.startY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 40;
    
    if (dist > maxDist) {
        dx *= maxDist / dist;
        dy *= maxDist / dist;
    }
    
    joystick.x = dx / maxDist;
    joystick.y = dy / maxDist;
    joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
});

window.addEventListener('pointerup', e => {
    joystick.active = false;
    joystick.x = 0;
    joystick.y = 0;
    joyKnob.style.transform = `translate(0, 0)`;
});

function spawnEnemy() {
    if (!gameActive || (bossMode && !boss)) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const buffer = 50;
    if(side === 0) { x = Math.random() * canvas.width; y = -buffer; }
    else if(side === 1) { x = canvas.width + buffer; y = Math.random() * canvas.height; }
    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + buffer; }
    else { x = -buffer; y = Math.random() * canvas.height; }
    
    enemies.push({ 
        x, y, 
        size: 30, 
        speed: 1.5 + (60 - timeLeft) * 0.05, 
        hp: 1 
    });
}

function spawnBoss() {
    bossMode = true;
    boss = { 
        x: canvas.width / 2, 
        y: -150, 
        size: 120, 
        hp: 1000, 
        maxHp: 1000,
        floatDir: 1
    };
    msgText.innerText = "THE JELLY BOSS HAS RISEN!";
    messageEl.style.display = "block";
    document.getElementById('restart-btn').style.display = "none";
    setTimeout(() => { if(gameActive) messageEl.style.display = "none"; }, 3000);
}

function update() {
    if (!gameActive) return;

    // 1. Movement Logic (Keyboard + Joystick)
    let moveX = joystick.x;
    let moveY = joystick.y;

    if (keys['ArrowUp'] || keys['KeyW']) moveY = -1;
    if (keys['ArrowDown'] || keys['KeyS']) moveY = 1;
    if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
    if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

    player.x += moveX * player.speed;
    player.y += moveY * player.speed;

    // Bounds
    player.x = Math.max(player.size/2, Math.min(canvas.width - player.size/2, player.x));
    player.y = Math.max(player.size/2, Math.min(canvas.height - player.size/2, player.y));
    
    if (Math.abs(moveX) > 0.1) player.angle = moveX * 0.2;

    // 2. Dragon Logic
    dragon.angle += 0.08;
    dragon.x = player.x + Math.cos(dragon.angle) * 70;
    dragon.y = player.y + Math.sin(dragon.angle) * 70;

    // 3. Weapons
    // Player Flamethrower
    if (Math.random() > 0.3) {
        flames.push({ 
            x: player.x, 
            y: player.y - 10, 
            vx: (Math.random() - 0.5) * 3, 
            vy: -8 - Math.random() * 4, 
            life: 25 
        });
    }

    // Dragon Fire (Auto-aim at nearest enemy)
    if (enemies.length > 0 && Math.random() > 0.92) {
        const target = enemies[0];
        const ang = Math.atan2(target.y - dragon.y, target.x - dragon.x);
        dragonFire.push({ 
            x: dragon.x, 
            y: dragon.y, 
            vx: Math.cos(ang) * 10, 
            vy: Math.sin(ang) * 10, 
            life: 50 
        });
    }

    // 4. Update Entities
    flames.forEach((f, i) => { f.x += f.vx; f.y += f.vy; f.life--; if(f.life <= 0) flames.splice(i, 1); });
    dragonFire.forEach((f, i) => { f.x += f.vx; f.y += f.vy; f.life--; if(f.life <= 0) dragonFire.splice(i, 1); });

    enemies.forEach((en, i) => {
        const ang = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(ang) * en.speed;
        en.y += Math.sin(ang) * en.speed;

        // Player Collision
        if (Math.hypot(player.x - en.x, player.y - en.y) < 35) {
            player.hp -= 0.4;
            healthFill.style.width = player.hp + "%";
        }

        // Fire Collision
        [...flames, ...dragonFire].forEach(f => {
            if (Math.hypot(f.x - en.x, f.y - en.y) < 25) {
                enemies.splice(i, 1);
            }
        });
    });

    // 5. Boss Logic
    if (boss) {
        boss.y = Math.min(boss.y + 2, 180);
        boss.x += boss.floatDir * 2;
        if (boss.x > canvas.width - 100 || boss.x < 100) boss.floatDir *= -1;

        [...flames, ...dragonFire].forEach(f => {
            if (Math.hypot(f.x - boss.x, f.y - boss.y) < boss.size / 2) {
                boss.hp -= 2;
                if (boss.hp <= 0) {
                    gameActive = false;
                    msgText.innerText = "THE JELLY IS SPREAD! YOU WIN!";
                    messageEl.style.display = "block";
                    document.getElementById('restart-btn').style.display = "inline-block";
                }
            }
        });
    }

    if (player.hp <= 0) {
        gameActive = false;
        msgText.innerText = "YOU ARE TOAST! (Literally)";
        messageEl.style.display = "block";
        document.getElementById('restart-btn').style.display = "inline-block";
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // City Buildings
    ctx.fillStyle = "#121a2b";
    for(let i=0; i<canvas.width; i+=80) {
        ctx.fillRect(i, canvas.height - 150, 60, 150);
    }

    // Flames
    flames.forEach(f => {
        ctx.fillStyle = `rgba(255, ${Math.random()*150}, 0, ${f.life/25})`;
        ctx.beginPath();
        ctx.arc(f.x, f.y, 10, 0, Math.PI*2);
        ctx.fill();
    });

    dragonFire.forEach(f => {
        ctx.fillStyle = `rgba(0, 255, 255, ${f.life/50})`;
        ctx.beginPath();
        ctx.arc(f.x, f.y, 12, 0, Math.PI*2);
        ctx.fill();
    });

    // Player (Toast)
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(-15, 20, 40, 10);
    // Body
    ctx.fillStyle = "#e3b066";
    ctx.fillRect(-22, -22, 44, 44);
    ctx.strokeStyle = "#8b4513";
    ctx.lineWidth = 3;
    ctx.strokeRect(-22, -22, 44, 44);
    // Eyes
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(-8, -5, 3, 0, Math.PI*2);
    ctx.arc(8, -5, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Dragon
    ctx.fillStyle = "#4caf50";
    ctx.beginPath();
    ctx.arc(dragon.x, dragon.y, 18, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.fillRect(dragon.x - 5, dragon.y - 5, 4, 4);
    ctx.fillRect(dragon.x + 1, dragon.y - 5, 4, 4);

    // Butter Enemies
    enemies.forEach(en => {
        ctx.fillStyle = "#fff176";
        ctx.fillRect(en.x - 15, en.y - 12, 30, 24);
        ctx.strokeStyle = "#fbc02d";
        ctx.lineWidth = 2;
        ctx.strokeRect(en.x - 15, en.y - 12, 30, 24);
        // Angry Eyes
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.moveTo(en.x-10, en.y-5); ctx.lineTo(en.x-2, en.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(en.x+10, en.y-5); ctx.lineTo(en.x+2, en.y); ctx.stroke();
    });

    // Jelly Boss
    if (boss) {
        ctx.fillStyle = "rgba(156, 39, 176, 0.9)";
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.size/2, 0, Math.PI*2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(boss.x - 20, boss.y - 10, 15, 0, Math.PI*2);
        ctx.arc(boss.x + 20, boss.y - 10, 15, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(boss.x - 20, boss.y - 10, 7, 0, Math.PI*2);
        ctx.arc(boss.x + 20, boss.y - 10, 7, 0, Math.PI*2);
        ctx.fill();

        // HP Bar
        ctx.fillStyle = "#333";
        ctx.fillRect(boss.x - 60, boss.y - 90, 120, 12);
        ctx.fillStyle = "#e91e63";
        ctx.fillRect(boss.x - 60, boss.y - 90, (boss.hp/boss.maxHp) * 120, 12);
    }
}

// Timing
setInterval(() => {
    if(gameActive && !bossMode) {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if(timeLeft <= 0) spawnBoss();
    }
}, 1000);

setInterval(spawnEnemy, 800);

update();
</script>
</body>
</html>
