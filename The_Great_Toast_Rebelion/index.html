<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Great Toast Rebellion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #game-ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; }
        canvas { display: block; background: #87ceeb; } /* City Sky Blue */
        
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: gold; font-size: 32px; text-align: center; display: none; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>Time: <span id="timer">60</span>s</div>
        <div>Health: <span id="health">100</span>%</div>
    </div>

    <div id="message"></div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const healthEl = document.getElementById('health');
const messageEl = document.getElementById('message');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game State
let gameActive = true;
let timeLeft = 60;
let bossMode = false;
let score = 0;

// Player (Toast)
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 40,
    hp: 100,
    speed: 4,
    angle: 0
};

// Dragon Sidekick
const dragon = { x: 0, y: 0, offset: 50, angle: 0 };

// Game Objects
let enemies = [];
let flames = [];
let dragonFire = [];
let boss = null;

// Joystick Logic
let joystick = { active: false, x: 0, y: 0, startX: 0, startY: 0 };
const knob = document.getElementById('joystick-knob');

window.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    const rect = document.getElementById('joystick-container').getBoundingClientRect();
    if(touch.clientX > rect.left && touch.clientX < rect.right && touch.clientY > rect.top && touch.clientY < rect.bottom) {
        joystick.active = true;
        joystick.startX = rect.left + rect.width/2;
        joystick.startY = rect.top + rect.height/2;
    }
});

window.addEventListener('touchmove', e => {
    if(!joystick.active) return;
    const touch = e.touches[0];
    let dx = touch.clientX - joystick.startX;
    let dy = touch.clientY - joystick.startY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 40;
    
    if(dist > maxDist) {
        dx *= maxDist / dist;
        dy *= maxDist / dist;
    }
    
    joystick.x = dx / maxDist;
    joystick.y = dy / maxDist;
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
});

window.addEventListener('touchend', () => {
    joystick.active = false;
    joystick.x = 0; joystick.y = 0;
    knob.style.transform = `translate(0, 0)`;
});

// Helper: Spawn Enemy
function spawnEnemy() {
    if (bossMode) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if(side === 0) { x = Math.random() * canvas.width; y = -50; }
    else if(side === 1) { x = canvas.width + 50; y = Math.random() * canvas.height; }
    else if(side === 2) { x = Math.random() * canvas.width; y = canvas.height + 50; }
    else { x = -50; y = Math.random() * canvas.height; }
    enemies.push({ x, y, size: 30, speed: 2, type: 'butter' });
}

function spawnBoss() {
    bossMode = true;
    boss = { x: canvas.width/2, y: -100, size: 100, hp: 500, maxHp: 500 };
    messageEl.innerHTML = "JELLY BOSS APPEARS!";
    messageEl.style.display = "block";
    setTimeout(() => messageEl.style.display = "none", 2000);
}

// Main Loop
function update() {
    if (!gameActive) return;

    // Move Player
    player.x += joystick.x * player.speed;
    player.y += joystick.y * player.speed;
    
    // Rotate Toast based on movement
    if(Math.abs(joystick.x) > 0.1) player.angle = joystick.x * 0.5;

    // Dragon follows player
    dragon.angle += 0.05;
    dragon.x = player.x + Math.cos(dragon.angle) * 60;
    dragon.y = player.y + Math.sin(dragon.angle) * 60;

    // Weapons: Player Flamethrower (Always shooting forward)
    if(Math.random() > 0.5) {
        flames.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*2, vy: -5 - Math.random()*5, life: 20 });
    }

    // Dragon Fire (Auto-aim)
    if(enemies.length > 0 && Math.random() > 0.9) {
        const target = enemies[0];
        const angle = Math.atan2(target.y - dragon.y, target.x - dragon.x);
        dragonFire.push({ x: dragon.x, y: dragon.y, vx: Math.cos(angle)*7, vy: Math.sin(angle)*7, life: 40 });
    }

    // Update Projectiles
    flames.forEach((f, i) => { f.x += f.vx; f.y += f.vy; f.life--; if(f.life <= 0) flames.splice(i, 1); });
    dragonFire.forEach((f, i) => { f.x += f.vx; f.y += f.vy; f.life--; if(f.life <= 0) dragonFire.splice(i, 1); });

    // Update Enemies
    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * en.speed;
        en.y += Math.sin(angle) * en.speed;

        // Collision with player
        const dist = Math.hypot(player.x - en.x, player.y - en.y);
        if(dist < 30) {
            player.hp -= 0.5;
            healthEl.innerText = Math.ceil(player.hp);
        }

        // Collision with fire
        flames.concat(dragonFire).forEach(f => {
            if(Math.hypot(f.x - en.x, f.y - en.y) < 25) {
                enemies.splice(i, 1);
            }
        });
    });

    // Boss Logic
    if(boss) {
        boss.y = Math.min(boss.y + 1, 150);
        flames.concat(dragonFire).forEach((f, fi) => {
            if(Math.hypot(f.x - boss.x, f.y - boss.y) < boss.size/2) {
                boss.hp -= 2;
                if(boss.hp <= 0) {
                    gameActive = false;
                    messageEl.innerHTML = "YOU DEFEATED THE JELLY BOSS!<br>CITY SAVED!";
                    messageEl.style.display = "block";
                }
            }
        });
    }

    if(player.hp <= 0) {
        gameActive = false;
        messageEl.innerText = "YOU TURNED TO CRUMBS! GAME OVER.";
        messageEl.style.display = "block";
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw City Background (Simple Silhouettes)
    ctx.fillStyle = "#444";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    
    // Draw Flames
    ctx.fillStyle = "orange";
    flames.forEach(f => ctx.fillRect(f.x, f.y, 8, 8));
    ctx.fillStyle = "cyan";
    dragonFire.forEach(f => ctx.fillRect(f.x, f.y, 10, 10));

    // Draw Toast Hero
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = "#DEB887"; // Bread color
    ctx.fillRect(-20, -20, 40, 40);
    ctx.strokeStyle = "#8B4513";
    ctx.strokeRect(-20, -20, 40, 40);
    // Eyes
    ctx.fillStyle = "black";
    ctx.fillRect(-10, -10, 5, 5); ctx.fillRect(5, -10, 5, 5);
    ctx.restore();

    // Draw Dragon
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.arc(dragon.x, dragon.y, 15, 0, Math.PI*2);
    ctx.fill();

    // Draw Butter Enemies
    ctx.fillStyle = "yellow";
    enemies.forEach(en => {
        ctx.fillRect(en.x - 15, en.y - 15, 30, 20);
        ctx.strokeStyle = "#DAA520";
        ctx.strokeRect(en.x - 15, en.y - 15, 30, 20);
    });

    // Draw Boss
    if(boss) {
        ctx.fillStyle = "rgba(255, 0, 255, 0.8)";
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.size/2, 0, Math.PI*2);
        ctx.fill();
        // Boss HP bar
        ctx.fillStyle = "red";
        ctx.fillRect(boss.x - 50, boss.y - 70, 100, 10);
        ctx.fillStyle = "lime";
        ctx.fillRect(boss.x - 50, boss.y - 70, (boss.hp/boss.maxHp)*100, 10);
    }
}

// Timer Logic
setInterval(() => {
    if(gameActive && timeLeft > 0) {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if(timeLeft === 0) spawnBoss();
    }
}, 1000);

// Enemy Spawner
setInterval(spawnEnemy, 1000);

update();
</script>
</body>
</html>
