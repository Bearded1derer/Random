<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover tells the phone to draw the game under the notch/bezels -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galactic Cat: Zombie Curer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            touch-action: none; /* Prevents zooming on touch screens */
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        
        /* UI and Safe Area Adjustments */
        #ui {
            position: absolute;
            top: max(10px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }
        #worldDisplay {
            font-size: 20px;
            color: #ffcc00;
            margin-top: 5px;
        }
        #healthBar {
            font-size: 24px;
            color: #ff3366;
            margin-top: 5px;
        }
        
        #fullscreenBtn {
            position: absolute;
            top: max(10px, env(safe-area-inset-top));
            right: max(20px, env(safe-area-inset-right));
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 0;
            transition: background 0.2s;
        }
        #fullscreenBtn:active {
            background: rgba(255, 255, 255, 0.5);
        }

        #controlsHelp {
            position: absolute;
            top: max(90px, calc(env(safe-area-inset-top) + 80px));
            left: max(20px, env(safe-area-inset-left));
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 4px solid #ff3366;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff3366;
            z-index: 100;
        }
        h1 { margin: 0 0 20px 0; font-size: 48px; color: #ff3366; }
        .play-btn {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #00ffcc;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .play-btn:hover { transform: scale(1.1); background-color: #fff; }

        /* Mobile Touch Controls */
        #touchControls {
            position: absolute;
            /* Keeps controls above the home swipe bar on modern phones */
            bottom: max(20px, env(safe-area-inset-bottom)); 
            
            /* Centers the controls and gives them a max-width for square screens/tablets */
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 900px; /* Keeps buttons reachable on a Z Fold or iPad */
            box-sizing: border-box;
            
            /* Keeps buttons away from camera hole-punches */
            padding-left: max(10px, env(safe-area-inset-left));
            padding-right: max(10px, env(safe-area-inset-right));
            
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        #joystickZone {
            width: 150px;
            height: 150px;
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }
        #joystickBase {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 15px;
        }
        #joystickKnob {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 35px;
            left: 35px;
            pointer-events: none;
        }
        .actions {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            pointer-events: auto;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            touch-action: none;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }
        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 30px;
        }

        @media (max-width: 600px) {
            #controlsHelp { display: none; }
            #scoreBoard { font-size: 18px; }
            #worldDisplay { font-size: 16px; }
            #healthBar { font-size: 18px; }
            #fullscreenBtn { width: 40px; height: 40px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="scoreBoard">Zombies Cured: 0</div>
        <div id="worldDisplay">World: 1 - Earth's Atmosphere</div>
        <div id="healthBar">Health: ❤️❤️❤️</div>
    </div>
    
    <button id="fullscreenBtn" aria-label="Toggle Fullscreen">🔲</button>

    <div id="controlsHelp">
        Keyboard: WASD/Arrows | SPACE: Knife | Z: Sword
    </div>

    <!-- Mobile Touch Controls overlay -->
    <div id="touchControls">
        <div id="joystickZone">
            <div id="joystickBase">
                <div id="joystickKnob"></div>
            </div>
        </div>
        <div class="actions">
            <div id="btnSword" class="touch-btn action-btn">⚔️</div>
            <div id="btnKnife" class="touch-btn action-btn">🗡️</div>
        </div>
    </div>

    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="finalScore" style="font-size: 24px; margin-bottom: 20px;">You cured 0 zombies.</p>
        <button class="play-btn" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const scoreBoard = document.getElementById('scoreBoard');
        const worldDisplay = document.getElementById('worldDisplay');
        const healthBar = document.getElementById('healthBar');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Fullscreen Toggle Logic
        fullscreenBtn.addEventListener('click', () => {
            const doc = window.document;
            const docEl = doc.documentElement;

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if (requestFullScreen) {
                    requestFullScreen.call(docEl).catch(err => {
                        console.log("Error attempting to enable full-screen mode: " + err.message);
                    });
                }
            } else {
                if (cancelFullScreen) {
                    cancelFullScreen.call(doc);
                }
            }
        });

        // Setup Canvas Size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        let gameActive = true;
        let score = 0;
        let level = 1;
        let frameCount = 0;

        // Worlds configuration
        const worlds = [
            { name: "Earth's Orbit", color: "#1a0b2e", stars: "#ffffff" },
            { name: "The Red Planet", color: "#3d1414", stars: "#ff9999" },
            { name: "Toxic Nebula", color: "#0f3319", stars: "#99ff99" },
            { name: "Golden Galaxy", color: "#332d0f", stars: "#ffff99" },
            { name: "Deep Void", color: "#000000", stars: "#ff00ff" }
        ];
        let currentWorld = worlds[0];

        // Input Tracking
        const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false, ' ':false, z:false };
        
        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key) || e.key === ' ') keys[e.key] = true;
            if(e.key === ' ' && gameActive) shootKnife();
            if(e.key.toLowerCase() === 'z' && gameActive) swingSword();
        });
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key) || e.key === ' ') keys[e.key] = false;
        });

        // Touch Controls Setup
        function bindTouch(btnId, keyStr, actionFunc) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            const press = (e) => {
                if (e.cancelable) e.preventDefault(); 
                keys[keyStr] = true;
                if(actionFunc && gameActive) actionFunc();
            };

            const release = (e) => {
                if (e.cancelable) e.preventDefault();
                keys[keyStr] = false;
            };

            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('mousedown', press);

            btn.addEventListener('touchend', release, {passive: false});
            btn.addEventListener('touchcancel', release, {passive: false});
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        // Joystick Setup
        const joystick = { x: 0, y: 0, active: false };
        const joyZone = document.getElementById('joystickZone');
        const joyKnob = document.getElementById('joystickKnob');
        let joyCenterX = 0;
        let joyCenterY = 0;
        const maxRadius = 35; 
        let isDraggingJoy = false;

        function updateJoystickCenter() {
            const rect = joyZone.getBoundingClientRect();
            joyCenterX = rect.left + rect.width / 2;
            joyCenterY = rect.top + rect.height / 2;
        }

        function handleJoystickMove(clientX, clientY) {
            let dx = clientX - joyCenterX;
            let dy = clientY - joyCenterY;
            let distance = Math.hypot(dx, dy);
            
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }
            
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            joystick.x = dx / maxRadius;
            joystick.y = dy / maxRadius;
        }

        const startJoystick = (e) => {
            if (e.cancelable) e.preventDefault();
            joystick.active = true;
            isDraggingJoy = true;
            updateJoystickCenter();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            handleJoystickMove(clientX, clientY);
        };

        const moveJoystick = (e) => {
            if (!joystick.active) return;
            if (e.cancelable) e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            handleJoystickMove(clientX, clientY);
        };

        const resetJoystick = (e) => {
            if (e && e.cancelable) e.preventDefault();
            joystick.active = false;
            isDraggingJoy = false;
            joystick.x = 0;
            joystick.y = 0;
            joyKnob.style.transform = `translate(0px, 0px)`;
        };

        joyZone.addEventListener('touchstart', startJoystick, {passive: false});
        joyZone.addEventListener('touchmove', moveJoystick, {passive: false});
        joyZone.addEventListener('touchend', resetJoystick, {passive: false});
        joyZone.addEventListener('touchcancel', resetJoystick, {passive: false});
        
        joyZone.addEventListener('mousedown', startJoystick);
        window.addEventListener('mousemove', moveJoystick);
        window.addEventListener('mouseup', resetJoystick);

        bindTouch('btnKnife', ' ', shootKnife);
        bindTouch('btnSword', 'z', swingSword);

        // --- Game Objects ---

        const cat = {
            x: 100,
            y: canvas.height / 2,
            size: 40,
            speed: 7,
            health: 3,
            swordTimer: 0,
            swordCooldown: 0
        };

        let knives = [];
        let zombies = [];
        let particles = [];
        let stars = [];

        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 3 + 1
            });
        }

        function shootKnife() {
            if (knives.length < 5) {
                knives.push({
                    x: cat.x + cat.size,
                    y: cat.y,
                    speed: 15,
                    size: 20
                });
                createParticles(cat.x + cat.size, cat.y, 5, '#ff6600');
            }
        }

        function swingSword() {
            if (cat.swordCooldown <= 0) {
                cat.swordTimer = 15;
                cat.swordCooldown = 30; 
            }
        }

        function spawnZombie() {
            let spawnRate = Math.max(20, 80 - (level * 5)); 
            if (frameCount % spawnRate === 0) {
                zombies.push({
                    x: canvas.width + 50,
                    y: Math.random() * (canvas.height - 100) + 50,
                    speed: Math.random() * 2 + 2 + (level * 0.5),
                    size: 40,
                    wobble: Math.random() * Math.PI * 2
                });
            }
        }

        function createParticles(x, y, count, color, speedMultiplier = 1) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10 * speedMultiplier,
                    vy: (Math.random() - 0.5) * 10 * speedMultiplier,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        function updateLevel() {
            let newLevel = Math.floor(score / 10) + 1;
            if (newLevel > level) {
                level = newLevel;
                currentWorld = worlds[(level - 1) % worlds.length];
                worldDisplay.innerText = `World: ${level} - ${currentWorld.name}`;
                createParticles(canvas.width/2, canvas.height/2, 100, '#00ffcc', 3);
            }
        }

        function updateHealthUI() {
            let hearts = "";
            for(let i=0; i<cat.health; i++) hearts += "❤️";
            healthBar.innerText = `Health: ${hearts}`;
            if (cat.health <= 0) {
                gameActive = false;
                gameOverScreen.style.display = 'block';
                finalScore.innerText = `You cured ${score} zombies and reached World ${level}!`;
            }
        }

        function resetGame() {
            cat.health = 3;
            score = 0;
            level = 1;
            cat.x = 100;
            cat.y = canvas.height / 2;
            knives = [];
            zombies = [];
            particles = [];
            currentWorld = worlds[0];
            gameActive = true;
            gameOverScreen.style.display = 'none';
            scoreBoard.innerText = `Zombies Cured: 0`;
            worldDisplay.innerText = `World: 1 - Earth's Atmosphere`;
            updateHealthUI();
            
            for (let k in keys) keys[k] = false;
        }

        // --- Main Game Loop ---

        function update() {
            if (!gameActive) return;

            frameCount++;

            if (joystick.active) {
                cat.x += joystick.x * cat.speed;
                cat.y += joystick.y * cat.speed;
            } else {
                if (keys.w || keys.ArrowUp) cat.y -= cat.speed;
                if (keys.s || keys.ArrowDown) cat.y += cat.speed;
                if (keys.a || keys.ArrowLeft) cat.x -= cat.speed;
                if (keys.d || keys.ArrowRight) cat.x += cat.speed;
            }

            cat.x = Math.max(cat.size, Math.min(canvas.width - cat.size, cat.x));
            cat.y = Math.max(cat.size, Math.min(canvas.height - cat.size, cat.y));

            if (cat.swordTimer > 0) cat.swordTimer--;
            if (cat.swordCooldown > 0) cat.swordCooldown--;

            stars.forEach(star => {
                star.x -= star.speed + (level * 0.5); 
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
            });

            for (let i = knives.length - 1; i >= 0; i--) {
                let k = knives[i];
                k.x += k.speed;
                createParticles(k.x - 10, k.y, 1, '#ff3300');
                createParticles(k.x - 10, k.y, 1, '#ffcc00');
                
                if (k.x > canvas.width) {
                    knives.splice(i, 1);
                }
            }

            spawnZombie();
            
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                z.x -= z.speed;
                z.wobble += 0.1;
                z.y += Math.sin(z.wobble) * 2; 

                let distToCat = Math.hypot(cat.x - z.x, cat.y - z.y);
                if (distToCat < cat.size/2 + z.size/2) {
                    cat.health--;
                    updateHealthUI();
                    createParticles(cat.x, cat.y, 30, '#ff3366');
                    zombies.splice(i, 1);
                    continue;
                }

                if (cat.swordTimer > 0) {
                    if (z.x > cat.x && z.x < cat.x + 150 && Math.abs(cat.y - z.y) < 100) {
                        cureZombie(i, z.x, z.y);
                        continue;
                    }
                }

                let knifeHit = false;
                for (let j = knives.length - 1; j >= 0; j--) {
                    let k = knives[j];
                    if (Math.hypot(k.x - z.x, k.y - z.y) < k.size/2 + z.size/2) {
                        knives.splice(j, 1); 
                        cureZombie(i, z.x, z.y); 
                        knifeHit = true;
                        break;
                    }
                }

                if (knifeHit) continue;

                if (z.x < -50) {
                    zombies.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function cureZombie(index, x, y) {
            zombies.splice(index, 1);
            score++;
            scoreBoard.innerText = `Zombies Cured: ${score}`;
            createParticles(x, y, 20, '#00ffcc');
            createParticles(x, y, 10, '#ffff00');
            updateLevel();
        }

        // --- Drawing Loop ---

        function draw() {
            ctx.fillStyle = currentWorld.color;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = currentWorld.stars;
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (cat.swordTimer > 0) {
                ctx.save();
                ctx.translate(cat.x, cat.y);
                
                let swingProgress = 1 - (cat.swordTimer / 15); 
                let angle = -Math.PI/2 + (swingProgress * Math.PI); 
                
                ctx.rotate(angle);
                
                let gradient = ctx.createLinearGradient(0, 0, 150, 0);
                gradient.addColorStop(0, "white");
                gradient.addColorStop(0.2, "yellow");
                gradient.addColorStop(0.6, "orange");
                gradient.addColorStop(1, "red");

                ctx.beginPath();
                ctx.moveTo(20, -10);
                ctx.lineTo(150, 0);
                ctx.lineTo(20, 10);
                ctx.fillStyle = gradient;
                ctx.fill();

                createParticles(cat.x + Math.cos(angle)*150, cat.y + Math.sin(angle)*150, 2, 'orange');

                ctx.restore();
            }

            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            knives.forEach(k => {
                ctx.fillText('🗡️', k.x, k.y);
            });

            ctx.font = "40px Arial";
            zombies.forEach(z => {
                ctx.fillText('🧟‍♂️', z.x, z.y);
            });

            ctx.font = "45px Arial";
            
            if (keys.w || keys.a || keys.s || keys.d || keys.ArrowUp || keys.ArrowLeft || keys.ArrowDown || keys.ArrowRight || joystick.active) {
                createParticles(cat.x - 20, cat.y + 10, 1, '#00ccff'); 
            }
            
            ctx.fillText('🐱', cat.x, cat.y);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

    </script>
</body>
</html>
